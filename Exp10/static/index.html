<!doctype html>
<html>
  <head>
    <title>Real-Time Voting</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>🗳️ Real-Time Voting</h1>
      <div
        id="message"
        style="
          display: none;
          background: #22c55e;
          padding: 10px;
          border-radius: 6px;
          margin: 10px 0;
          color: black;
          font-weight: bold;
        "
      ></div>

      <div class="card">
        <h2>Create Poll</h2>
        <input id="question" placeholder="Enter question" />

        <div id="options-input">
          <input placeholder="Option 1" />
          <input placeholder="Option 2" />
        </div>

        <button onclick="addOption()">+ Add Option</button>
        <button onclick="createPoll()">Create</button>
      </div>

      <div class="card">
        <h2>All Polls</h2>
        <div id="poll-list"></div>
      </div>

      <div class="card">
        <h2 id="selected-question">Select a poll</h2>
        <div id="options"></div>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
